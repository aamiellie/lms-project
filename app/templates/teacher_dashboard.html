<!DOCTYPE html>
<html>
<head>
    <title>Teacher Dashboard | LUMA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>
        function copyCode(code) {
            navigator.clipboard.writeText(code);
            alert("Invite code copied: " + code);
        }
    </script>

<style>
/* =========================
   TEACHER DASHBOARD - DARK AI
========================= */

:root {
    --bg-dark: #21201E;
    --bg-card: #2A2927;
    --accent: #FF4000;
    --text-light: #F9F8F6;
    --text-muted: #bfbfbf;
    --border-dark: #333330;
}

/* =========================
   GLOBAL
========================= */

body.teacher-theme {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background-color: var(--bg-dark);
    color: var(--text-light);
}

.dashboard-container {
    padding: 60px 90px;
}

/* =========================
   HEADER
========================= */

.dashboard-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.dashboard-header h2 {
    margin: 0;
    color: var(--accent);
}

.logout-btn {
    text-decoration: none;
    padding: 8px 18px;
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 6px;
    transition: 0.3s ease;
}

.logout-btn:hover {
    background: var(--accent);
    color: var(--bg-dark);
    box-shadow: 0 0 15px rgba(255, 64, 0, 0.4);
}

/* =========================
   WELCOME TEXT
========================= */

.welcome-text {
    margin: 15px 0 40px 0;
    color: var(--text-muted);
}

/* =========================
   ACTION BUTTONS
========================= */

.dashboard-actions {
    display: flex;
    gap: 20px;
    margin-bottom: 40px;
}

.action-card {
    background: var(--bg-card);
    border: 1px solid var(--border-dark);
    color: var(--text-light);
    padding: 18px 25px;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s ease;
    font-weight: 500;
}

.action-card:hover {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 12px rgba(255, 64, 0, 0.3);
}

/* =========================
   CREATE CLASSROOM BOX
========================= */

#createClassroomBox {
    background: var(--bg-card);
    border: 1px solid var(--border-dark);
    padding: 25px;
    border-radius: 6px;
    margin-bottom: 40px;
    display: none;
}

.show-create-box {
    display: block !important;
}

#createClassroomBox label {
    display: block;
    margin-bottom: 6px;
    color: var(--text-muted);
}

#createClassroomBox input {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 6px;
    border: 1px solid var(--border-dark);
    background: #1c1b1a;
    color: var(--text-light);
    font-size: 14px;
}

#createClassroomBox input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 8px rgba(255, 64, 0, 0.3);
}

.create-btn {
    background: var(--accent);
    color: var(--bg-dark);
    padding: 10px 18px;
    border: none;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s ease;
}

.create-btn:hover {
    box-shadow: 0 0 15px rgba(255, 64, 0, 0.5);
}

/* =========================
   CLASSROOM SECTION
========================= */

.section-title {
    color: var(--accent);
    margin-bottom: 25px;
}

.classroom-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 25px;
}

.classroom-card {
    background: var(--bg-card);
    border: 1px solid var(--border-dark);
    padding: 25px;
    border-radius: 6px;
    transition: 0.3s ease;
}

.classroom-card:hover {
    border-color: var(--accent);
    box-shadow: 0 0 15px rgba(255, 64, 0, 0.25);
}

/* Classroom Title */
.classroom-title {
    color: var(--text-light);
    font-weight: 600;
    display: block;
    margin-bottom: 18px;
    text-decoration: none;
}

.classroom-title:hover {
    color: var(--accent);
}

/* Invite Section */
.invite-section {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
}

.invite-label {
    font-size: 13px;
    color: var(--text-muted);
}

.invite-code {
    background: #1c1b1a;
    padding: 5px 10px;
    border-radius: 4px;
    font-size: 13px;
}

.copy-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
    transition: 0.3s ease;
}

.copy-btn:hover {
    background: var(--accent);
    color: var(--bg-dark);
}

/* Empty State */
.empty-text {
    color: var(--text-muted);
}
</style>
</head>
<body class="teacher-theme">

<div class="dashboard-container">

    <!-- HEADER -->
    <div class="dashboard-header">
        <h2>Teacher Dashboard</h2>
        <a href="/logout" class="logout-btn">Logout</a>
    </div>

    <p class="welcome-text">Welcome, {{ name }} 👋</p>

    <!-- ACTION BUTTONS -->
    <div class="dashboard-actions">

    <button class="action-card" onclick="toggleCreateBox()">
        + Create Virtual Classroom
    </button>

    <a href="/teacher/upload" class="action-card">
        Upload Study Materials
    </a>

</div>

<!-- CREATE CLASSROOM FORM (HIDDEN INITIALLY) -->

<div id="createClassroomBox" class="create-box-hidden">

    <form method="POST" action="/teacher/create-classroom">

        <label>Classroom Name</label>
        <input type="text" name="class_name" required>

        <button type="submit" class="create-btn">
            Create Classroom
        </button>

    </form>

</div>

    <!-- CLASSROOMS -->
    <h3 class="section-title">Your Classrooms</h3>

    {% if classrooms %}
        <div class="classroom-grid">
            {% for classroom in classrooms %}
                <div class="classroom-card">

                    <a href="/teacher/classroom/{{ classroom._id }}" class="classroom-title">
                        {{ classroom.class_name }}
                    </a>

                    <div class="invite-section">
                        <span class="invite-label">Invite Code:</span>
                        <span class="invite-code">{{ classroom.invite_code }}</span>
                        <button class="copy-btn"
                            onclick="copyCode('{{ classroom.invite_code }}')">
                            Copy
                        </button>
                    </div>

                </div>
            {% endfor %}
        </div>
    {% else %}
        <p class="empty-text">You haven’t created any classrooms yet.</p>
    {% endif %}

</div>

</body>
<script>
function toggleCreateBox() {
    const box = document.getElementById("createClassroomBox");
    box.classList.toggle("show-create-box");
}
</script>
</html>
