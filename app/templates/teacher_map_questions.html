<!DOCTYPE html>
<html>
<head>
    <title>Map Questions to Video</title>

<style>

:root{
--primary:#F2C94C;
--bg:#F5F5F5;
--card:#FFFFFF;
--text:#1E1E1E;
--grey:#BDBDBD;
--dark:#2F2F2F;
}

/* ===== GLOBAL ===== */

body{
font-family:"Segoe UI", Arial, sans-serif;
background:var(--bg);
color:var(--text);
padding:60px 100px;
margin:0;
font-size:20px;
}

/* ===== TITLE ===== */

h2{
font-size:32px;
margin-bottom:10px;
color:var(--dark);
}

p{
color:#666;
margin-bottom:30px;
}

/* ===== LAYOUT ===== */

.container{
display:flex;
gap:30px;
align-items:flex-start;
}

/* ===== LEFT (VIDEO) ===== */

.left{
width:60%;
background:var(--card);
padding:20px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

video{
width:100%;
height:360px;
border-radius:10px;
background:black;
object-fit:cover;
}

/* ===== RIGHT (QUESTIONS) ===== */

.right{
width:40%;
background:var(--card);
padding:25px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

.right h3{
margin-bottom:20px;
color:var(--dark);
}

/* ===== QUESTION CARD ===== */

.question{
border:1px solid #eee;
border-radius:12px;
padding:18px;
margin-bottom:15px;
transition:0.2s ease;
}

.question:hover{
border-color:var(--primary);
}

/* ===== TEXT ===== */

.question label{
font-weight:600;
display:block;
margin-bottom:10px;
}

/* ===== INPUT ===== */

.timestamp{
width:100px;
padding:8px;
border-radius:6px;
border:1px solid #ddd;
margin-top:8px;
}

/* ===== BUTTONS ===== */

button{
margin-top:10px;
padding:10px 16px;
border:none;
border-radius:8px;
background:var(--primary);
color:black;
font-weight:600;
cursor:pointer;
transition:0.2s ease;
}

button:hover{
background:#e0b93f;
}

/* ===== RADIO SPACING ===== */

input[type="radio"]{
margin-right:6px;
}

/* ===== SAVE BUTTON ===== */

form > button{
margin-top:20px;
padding:14px 22px;
}

/* ===== BACK LINK ===== */

a{
display:inline-block;
margin-top:40px;
text-decoration:none;
color:var(--text);
}

a:hover{
color:var(--primary);
}

</style>
</head>
<body>

<h2>🧠 Map Questions to Lecture</h2>
<p><strong>Video:</strong> {{ video.title }}</p>

<div class="container">

    <!-- LEFT: VIDEO PLAYER -->
    <div class="left">
        <video id="lectureVideo" controls>
            <source src="/videos/{{ video.video_filename }}" type="video/mp4">
            Your browser does not support video playback.
        </video>
        
    </div>

    <!-- RIGHT: QUESTIONS -->
    <div class="right">
        <h3>AI Suggested Questions</h3>

<form method="POST">

{% for q in ai_questions %}
<div class="question">
    <label>{{ q.question }}</label><br><br>

<input type="radio"
       name="mode_{{ q._id }}"
       value="during"
       onclick="enableDuring('{{ q._id }}')">
Ask during video<br>

Time (seconds):
<input type="number"
       class="timestamp"
       name="time_{{ q._id }}"
       id="time_{{ q._id }}"
       min="0"
       disabled>

<button type="button"
        id="btn_{{ q._id }}"
        onclick="useCurrentTime('{{ q._id }}')"
        disabled>
    Use current time
</button>

<br><br>

<input type="radio"
       name="mode_{{ q._id }}"
       value="after"
       checked
       onclick="enableAfter('{{ q._id }}')">
Ask after class
</div>
{% endfor %}

<button type="submit">Save Question Plan</button>
</form>

    </div>

</div>

<br>
<a href="javascript:history.back()">⬅ Back</a>

<script>
    const video = document.getElementById("lectureVideo");

    function enableDuring(qid) {
        document.getElementById("time_" + qid).disabled = false;
        document.getElementById("btn_" + qid).disabled = false;
    }

    function enableAfter(qid) {
        document.getElementById("time_" + qid).disabled = true;
        document.getElementById("btn_" + qid).disabled = true;
        document.getElementById("time_" + qid).value = "";
    }

    function useCurrentTime(qid) {
        const current = Math.floor(video.currentTime);
        document.getElementById("time_" + qid).value = current;
    }
</script>


</body>
</html>
