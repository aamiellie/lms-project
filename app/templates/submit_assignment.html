<!DOCTYPE html>
<html>
<head>
<title>Submit Assignment</title>

<style>

:root{
--primary:#F2C94C;
--bg:#F5F5F5;
--card:#FFFFFF;
--text:#1E1E1E;
--grey:#BDBDBD;
--dark:#2F2F2F;
}

/* ===== GLOBAL ===== */

body{
margin:0;
padding:70px 100px;
background:var(--bg);
color:var(--text);
font-family:"Segoe UI", Arial, sans-serif;
font-size:20px;
}

/* ===== CARD ===== */

.container{
max-width:700px;
background:var(--card);
padding:35px;
border-radius:16px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

/* ===== TITLE ===== */

h2{
font-size:32px;
margin-bottom:10px;
color:var(--dark);
}

/* ===== DESCRIPTION ===== */

p{
color:#555;
margin-bottom:25px;
line-height:1.6;
}

/* ===== LINK ===== */

a{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
color:var(--primary);
font-weight:600;
}

a:hover{
text-decoration:underline;
}

/* ===== INPUT ===== */

input[type="file"]{
width:100%;
padding:14px;
border-radius:8px;
border:1px solid #ddd;
background:#fafafa;
margin-top:10px;
margin-bottom:25px;
font-size:16px;
}

/* ===== BUTTON ===== */

button{
background:var(--primary);
color:black;
border:none;
padding:14px 24px;
border-radius:10px;
font-weight:600;
font-size:16px;
cursor:pointer;
transition:0.2s ease;
}

button:hover{
background:#e0b93f;
transform:translateY(-1px);
}

</style>
</head>

<body>

<div class="container">

<h2>{{ assignment.title }}</h2>
<p>{{ assignment.description }}</p>

{% if assignment.question_file %}
<a href="/uploads/{{ assignment.question_file }}" target="_blank">
    📄 View Question File
</a>
{% endif %}

<form method="POST" enctype="multipart/form-data">

    <label><strong>Upload Your Answer (PDF/DOC)</strong></label>

    <input type="file" name="file" required>

    <button type="submit">Submit Assignment</button>

</form>

</div>

</body>
</html>
