<!DOCTYPE html>
<html>
<head>
    <title>AI Video Creation</title>

<style>

:root{
--primary:#F2C94C;
--bg:#F5F5F5;
--card:#FFFFFF;
--text:#1E1E1E;
--grey:#BDBDBD;
--dark:#2F2F2F;
}

/* ===== GLOBAL ===== */

body{
margin:0;
padding:70px 100px;
background:var(--bg);
color:var(--text);
font-family:"Segoe UI", Arial, sans-serif;
font-size:20px;
}

/* ===== TITLES ===== */

h2{
font-size:38px;
margin-bottom:30px;
color:var(--dark);
}

h3{
font-size:28px;
margin-bottom:20px;
color:var(--dark);
}

/* ===== STEP CARD ===== */

.step-card{
background:var(--card);
padding:30px;
border-radius:14px;
margin-bottom:40px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

/* ===== TEXTAREA ===== */

textarea{
width:100%;
padding:16px;
border-radius:10px;
border:1px solid var(--grey);
font-size:18px;
margin-bottom:20px;
resize:vertical;
}

textarea:focus{
outline:none;
border-color:var(--primary);
}

/* ===== BUTTON ===== */

button{
background:var(--primary);
color:var(--text);
border:none;
padding:14px 26px;
border-radius:10px;
font-weight:600;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#e4b93f;
}

/* ===== MEDIA ===== */

audio,
video{
margin-top:20px;
border-radius:10px;
width:100%;
max-width:650px;
}

/* ===== BACK LINK ===== */

.back-link{
display:inline-block;
margin-top:40px;
font-size:18px;
text-decoration:none;
color:var(--text);
}

.back-link:hover{
color:var(--primary);
}

</style>
</head>

<body>

<h2>Extracted Content Preview</h2>

<!-- STEP 1 -->
<div class="step-card">
    <form method="POST">
        <input type="hidden" name="presenter" value="{{ presenter }}">
        <input type="hidden" name="title" value="{{ title }}">
        <input type="hidden" name="description" value="{{ description }}">
        <input type="hidden" name="action" value="generate_narration">

        <textarea name="extracted_text" rows="12">
{{ extracted_text }}
        </textarea>

        <button type="submit">Generate AI Narration</button>
    </form>
</div>


{% if narration %}
<h3>AI Generated Narration</h3>

<div class="step-card">
    <form method="POST">
        <input type="hidden" name="presenter" value="{{ presenter }}">
        <input type="hidden" name="title" value="{{ title }}">
        <input type="hidden" name="description" value="{{ description }}">
        <input type="hidden" name="action" value="generate_audio">

        <textarea name="narration" rows="12">
{{ narration }}
        </textarea>

        <button type="submit">Generate Audio</button>
    </form>
</div>
{% endif %}


{% if audio_file %}
<h3>Narration Audio</h3>

<div class="step-card">
    <audio controls>
        <source src="/audio/{{ audio_file }}" type="audio/mpeg">
    </audio>

    <form method="POST" style="margin-top:20px;">
        <input type="hidden" name="presenter" value="{{ presenter }}">
        <input type="hidden" name="title" value="{{ title }}">
        <input type="hidden" name="description" value="{{ description }}">
        <input type="hidden" name="action" value="generate_video">
        <input type="hidden" name="audio_file" value="{{ audio_file }}">

        <textarea name="narration" style="display:none;">
{{ narration }}
        </textarea>

        <textarea name="extracted_text" style="display:none;">
{{ extracted_text }}
        </textarea>

        <button type="submit">Generate Final Video</button>
    </form>
</div>
{% endif %}


{% if video_file %}
<h3>Final Lecture Video</h3>

<div class="step-card">
    <video controls>
        <source src="/videos/{{ video_file }}" type="video/mp4">
    </video>
</div>
{% endif %}

<a href="/teacher/classroom/{{ classroom_id }}" class="back-link">
    ⬅ Back to Classroom
</a>

</body>
</html>
