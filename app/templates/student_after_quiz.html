<!DOCTYPE html>
<html>
<head>
    <title>After Class Quiz</title>
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* ===== GLOBAL ===== */

body{
font-family:"Segoe UI", Arial, sans-serif;
background:#F5F5F5;
color:#1E1E1E;
padding:70px 100px;
font-size:20px;
}

/* ===== TITLE ===== */

h2{
font-size:38px;
font-weight:700;
margin-bottom:10px;
color:#2F2F2F;
}

p strong{
color:#555;
font-size:20px;
}

/* ===== FORM ===== */

form{
margin-top:40px;
}

/* ===== QUESTION CARD ===== */

.question-card{
background:#FFFFFF;
border-radius:14px;
padding:28px;
margin-bottom:30px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
border:1px solid #E0E0E0;
}

.question-card p{
margin-bottom:18px;
font-size:22px;
}

/* ===== OPTIONS ===== */

label{
display:block;
margin-bottom:12px;
cursor:pointer;
padding:10px 14px;
border-radius:8px;
font-size:19px;
transition:0.2s;
}

label:hover{
background:#F2F2F2;
}

input[type="radio"]{
margin-right:10px;
}

/* ===== BUTTON ===== */

button{
margin-top:25px;
padding:14px 28px;
background:#F2C94C;
color:#1E1E1E;
border:none;
border-radius:10px;
font-weight:600;
cursor:pointer;
font-size:20px;
}

button:hover{
background:#e4b93f;
}

/* ===== BACK LINK ===== */

a{
color:#1E1E1E;
text-decoration:none;
font-size:18px;
}

a:hover{
color:#F2C94C;
}

</style>
</head>
<body>

<h2>📝 After-Class Quiz</h2>
<p><strong>{{ video.title }}</strong></p>

<form method="POST" action="{{ url_for('submit_after_quiz', classroom_id=classroom._id, video_id=video._id) }}">

    {% for q in questions %}
        <div class="question-card">
            <p><strong>{{ loop.index }}. {{ q.question }}</strong></p>

            {% set letters = ['A','B','C','D'] %}
            {% for option in q.options %}
                <label>
                    <input type="radio"
                           name="question_{{ q._id }}"
                           value="{{ letters[loop.index0] }}">
                    {{ letters[loop.index0] }}. {{ option }}
                </label><br>
            {% endfor %}
        </div>
        <hr>
    {% endfor %}

    <button type="submit">Submit Quiz</button>

</form>

<br>
<a href="/student/classroom/{{ classroom._id }}">⬅ Back</a>

</body>
</html>
