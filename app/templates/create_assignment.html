<!DOCTYPE html>
<html>
<head>
    <title>Create Assignment</title>

    <style>
    :root {
        --bg-dark: #21201E;
        --bg-card: #2A2927;
        --accent: #FF5C00;
        --text-light: #F9F8F6;
        --text-muted: #bfbfbf;
        --border-dark: #333330;
    }

    body {
        margin: 0;
        padding: 60px 90px;
        background: var(--bg-dark);
        color: var(--text-light);
        font-family: "Segoe UI", Arial, sans-serif;
    }

    h2 {
        color: var(--accent);
        margin-bottom: 35px;
    }

    form {
        background: var(--bg-card);
        border: 1px solid var(--border-dark);
        padding: 30px;
        border-radius: 10px;
        max-width: 600px;
        transition: 0.3s ease;
    }

    form:hover {
        border-color: var(--accent);
        box-shadow: 0 0 18px rgba(255,92,0,0.25);
    }

    label {
        display: block;
        margin-bottom: 6px;
        color: var(--text-muted);
        font-size: 14px;
    }

    input[type="text"],
    textarea,
    input[type="file"],
    input[type="date"] {
        width: 100%;
        background: #1c1b1a;
        border: 1px solid var(--border-dark);
        color: var(--text-light);
        padding: 10px;
        border-radius: 6px;
        margin-bottom: 20px;
        font-size: 14px;
    }

    textarea {
        resize: vertical;
        min-height: 100px;
    }

    input:focus,
    textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 8px rgba(255,92,0,0.4);
    }

    button {
        background: var(--accent);
        color: var(--bg-dark);
        border: none;
        padding: 10px 20px;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s ease;
    }

    button:hover {
        box-shadow: 0 0 15px rgba(255,92,0,0.6);
        transform: translateY(-2px);
    }

    .back-link {
        display: inline-block;
        margin-top: 40px;
        color: var(--accent);
        text-decoration: none;
    }

    .back-link:hover {
        text-shadow: 0 0 6px rgba(255,92,0,0.6);
    }
    </style>
</head>

<body>

<h2>Create Assignment</h2>

<form method="POST" enctype="multipart/form-data">

    <label>Title</label>
    <input type="text" name="title" required>

    <label>Description</label>
    <textarea name="description"></textarea>

    <label>Upload Question File (PDF/DOC)</label>
    <input type="file" name="file">

    <label>Due Date</label>
    <input type="date" name="due_date">

    <button type="submit">Create Assignment</button>

</form>

<a href="javascript:history.back()" class="back-link">
    ⬅ Back
</a>

</body>
</html>
