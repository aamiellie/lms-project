<!DOCTYPE html>
<html>
<head>
    <title>Register | LMS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<style>

/* =========================
COLOR SYSTEM
========================= */

:root{
--primary:#F2C94C;
--bg:#F5F5F5;
--card:#FFFFFF;
--text:#1E1E1E;
--grey:#BDBDBD;
--dark:#2F2F2F;
}

/* =========================
GLOBAL
========================= */

body{
margin:0;
font-family:"Segoe UI", Arial, sans-serif;
background:var(--bg);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:var(--text);
font-size:18px;
}

/* =========================
AUTH CONTAINER
========================= */

.auth-container{
width:100%;
display:flex;
justify-content:center;
align-items:center;
}

/* =========================
AUTH CARD
========================= */

.auth-card{
background:var(--card);
padding:55px 50px;
width:420px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.auth-card h2{
margin-top:0;
margin-bottom:35px;
font-size:32px;
font-weight:700;
}

/* =========================
INPUT GROUPS
========================= */

.input-group{
margin-bottom:25px;
}

label{
font-size:16px;
font-weight:500;
}

input,
select{
width:100%;
padding:14px;
margin-top:8px;
border-radius:8px;
border:1px solid var(--grey);
font-size:16px;
background:white;
}

input:focus,
select:focus{
outline:none;
border-color:var(--primary);
}

/* =========================
BUTTON
========================= */

.auth-btn{
width:100%;
padding:16px;
background:var(--primary);
border:none;
border-radius:10px;
font-weight:600;
font-size:18px;
cursor:pointer;
margin-top:10px;
}

.auth-btn:hover{
background:#e0b93f;
}

/* =========================
SWITCH TEXT
========================= */

.auth-switch{
margin-top:30px;
font-size:16px;
text-align:center;
}

.auth-switch a{
color:var(--dark);
font-weight:600;
}

.auth-switch a:hover{
color:var(--primary);
}

</style>
</head>
<body>

<!-- Background Video -->


<div class="auth-container">

    <div class="auth-card">
        <h2>Create Account</h2>

        <form method="POST">

            <div class="input-group">
                <label>Name</label>
                <input type="text" name="name" required>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <div class="input-group">
                <label>Role</label>
                <select name="role" required>
                    <option value="">Select Role</option>
                    <option value="teacher">Teacher</option>
                    <option value="student">Student</option>
                </select>
            </div>

            <button type="submit" class="auth-btn">Register</button>

        </form>

        <p class="auth-switch">
            Already have an account?
            <a href="/login">Login</a>
        </p>
    </div>

</div>

</body>
</html>
