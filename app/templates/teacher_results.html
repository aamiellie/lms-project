<!DOCTYPE html>
<html>
<head>
    <title>Student Results</title>

<style>

:root{
--primary:#F2C94C;
--bg:#F5F5F5;
--card:#FFFFFF;
--text:#1E1E1E;
--grey:#BDBDBD;
--dark:#2F2F2F;
}

/* ===== GLOBAL ===== */

body{
margin:0;
padding:70px 100px;
background:var(--bg);
color:var(--text);
font-family:"Segoe UI", Arial, sans-serif;
font-size:20px;
}

/* ===== TITLE ===== */

h2{
font-size:34px;
margin-bottom:40px;
color:var(--dark);
}

/* ===== TABLE CONTAINER ===== */

.table-wrapper{
background:var(--card);
border-radius:14px;
padding:30px;
overflow-x:auto;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

/* ===== TABLE ===== */

table{
width:100%;
border-collapse:collapse;
}

th{
background:#2F2F2F;
color:#ffffff;
padding:16px;
font-size:18px;
text-align:center;
}

td{
padding:16px;
border-bottom:1px solid #eee;
text-align:center;
font-size:18px;
}

tr:hover{
background:#fafafa;
}

/* ===== SCORE ===== */

.score-highlight{
color:#2F80ED;
font-weight:600;
}

/* ===== EMPTY ===== */

.no-results{
color:#777;
font-style:italic;
font-size:18px;
}

/* ===== BACK ===== */

.back-link{
display:inline-block;
margin-top:40px;
font-size:18px;
text-decoration:none;
color:var(--text);
}

.back-link:hover{
color:var(--primary);
}

</style>
</head>

<body>

<h2>📊 Student Performance</h2>

{% if results and results|length > 0 %}

<div class="table-wrapper">
<table>
    <tr>
        <th>Student Name</th>
        <th>Video</th>
        <th>Correct</th>
        <th>Total</th>
        <th>Score (%)</th>
    </tr>

    {% for r in results %}
    <tr>
        <td>{{ r.student_name }}</td>
        <td>{{ r.video_title }}</td>
        <td>{{ r.correct }}</td>
        <td>{{ r.total }}</td>
        <td class="score-highlight">{{ r.score }}</td>
    </tr>
    {% endfor %}
</table>
</div>

{% else %}

<p class="no-results">No results yet.</p>

{% endif %}

<a href="javascript:history.back()" class="back-link">
    ⬅ Back
</a>

</body>
</html>
