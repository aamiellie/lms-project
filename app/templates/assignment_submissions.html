<!DOCTYPE html>
<html>
<head>
    <title>Assignment Submissions</title>
<style>

:root{
--primary:#F2C94C;
--bg:#F5F5F5;
--card:#FFFFFF;
--text:#1E1E1E;
--grey:#BDBDBD;
--dark:#2F2F2F;
}

/* ===== GLOBAL ===== */

body{
margin:0;
padding:70px 100px;
background:var(--bg);
color:var(--text);
font-family:"Segoe UI", Arial, sans-serif;
font-size:20px;
}

/* ===== TITLE ===== */

h2{
font-size:34px;
margin-bottom:40px;
color:var(--dark);
}

/* ===== TABLE CONTAINER ===== */

.table-container{
background:var(--card);
border-radius:14px;
overflow:hidden;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

/* ===== TABLE ===== */

table{
width:100%;
border-collapse:collapse;
}

/* ===== HEADER ===== */

th{
padding:16px;
text-align:left;
background:#2F2F2F;
color:white;
font-size:18px;
}

/* ===== CELLS ===== */

td{
padding:16px;
border-bottom:1px solid #eee;
font-size:18px;
}

tr:hover{
background:#fafafa;
}

/* ===== VIEW LINK ===== */

a{
color:var(--text);
text-decoration:none;
font-weight:500;
}

a:hover{
color:var(--primary);
}

/* ===== BACK BUTTON ===== */

.back-link{
display:inline-block;
margin-top:40px;
padding:10px 18px;
border-radius:8px;
background:var(--primary);
color:black;
font-weight:600;
text-decoration:none;
transition:0.2s ease;
}

.back-link:hover{
background:#e0b93f;
}

</style>
</head>
<body>

<h2>📄 Assignment Submissions</h2>

{% if submissions %}
    <div class="table-container">
<table>
        <tr>
            <th>Student Name</th>
            <th>Submitted At</th>
            <th>View File</th>
        </tr>

        {% for s in submissions %}
        <tr>
            <td>{{ s.student_name }}</td>
            <td>
                {{ s.submitted_at.strftime("%d %b %Y - %I:%M %p") }}
            </td>
            <td>
                <a href="/uploads/{{ s.answer_file }}" target="_blank">
                    📂 View
                </a>
            </td>
        </tr>
        {% endfor %}
    </table>
    </div>
{% else %}
    <p>No submissions yet.</p>
{% endif %}

<br>
<a href="javascript:history.back()" class="back-link">⬅ Back</a>

</body>
</html>
