<!DOCTYPE html>
<html>
<head>

<title>Live Class</title>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>

:root{
--primary:#F2C94C;
--dark:#121212;
--card:#1E1E1E;
--text:#EAEAEA;
--border:#2A2A2A;
}

/* ===== GLOBAL ===== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI", Arial, sans-serif;
}

body{
background:var(--dark);
color:var(--text);
padding:25px;
font-size:18px;
}

/* ===== TITLE ===== */

h2{
margin-bottom:20px;
color:var(--primary);
font-size:28px;
}

/* ===== GRID ===== */

.container{
display:grid;
grid-template-columns: 2.5fr 1fr;
grid-template-rows: auto 1fr;
gap:20px;
height:85vh;
}

/* ===== VIDEO SECTION ===== */

.video-section{
background:var(--card);
border-radius:12px;
padding:20px;
display:flex;
flex-direction:column;
}

.video-section h3{
margin-bottom:12px;
color:var(--primary);
font-size:20px;
}

/* ✅ FIXED VIDEO SIZE */

video{
width:100%;
height:360px;
border-radius:10px;
background:black;
object-fit:cover;
}

/* ===== BUTTONS ===== */

button{
margin-right:10px;
margin-top:12px;
padding:10px 16px;
border:none;
border-radius:8px;
background:var(--primary);
color:black;
font-weight:600;
cursor:pointer;
transition:0.2s ease;
}

button:hover{
background:#e0b93f;
}

/* ===== SCREEN SHARE ===== */

.screen-section{
background:var(--card);
border-radius:12px;
padding:20px;
display:none;
}

.screen-section h3{
color:var(--primary);
margin-bottom:10px;
}

/* ===== CHAT ===== */

.chat{
background:var(--card);
border-radius:12px;
padding:15px;
display:flex;
flex-direction:column;
}

.chat h3{
color:var(--primary);
margin-bottom:10px;
}

/* CHAT BOX */

#chat-box{
flex:1;
overflow-y:auto;
background:#181818;
border-radius:8px;
padding:10px;
margin-bottom:10px;
}

#chat-box p{
margin-bottom:8px;
font-size:14px;
}

/* CHAT INPUT */

.chat input{
padding:10px;
border-radius:8px;
border:1px solid var(--border);
background:#121212;
color:white;
width:70%;
}

.chat button{
width:25%;
}

/* ===== STUDENTS ===== */

.students{
background:var(--card);
border-radius:12px;
padding:15px;
}

.students h3{
color:var(--primary);
margin-bottom:10px;
}

.students ul{
list-style:none;
max-height:200px;
overflow-y:auto;
}

.students li{
padding:8px;
border-bottom:1px solid var(--border);
}

/* ===== SCROLLBAR ===== */

::-webkit-scrollbar{
width:6px;
}

::-webkit-scrollbar-thumb{
background:var(--primary);
border-radius:10px;
}

</style></head>

<body>

<h2>Live Class</h2>

<div class="container">

<!-- TEACHER CAMERA -->

<div class="video-section">

<h3>Teacher Camera</h3>

<video id="teacherVideo" autoplay playsinline></video>

<br><br>

{% if role == "teacher" %}
<button onclick="startScreenShare()">Share Screen</button>
<button onclick="openBoard()">Open Blackboard</button>
<button onclick="endClass()">End Class</button>
{% endif %}

</div>


<!-- CHAT -->

<div class="chat">

<h3>Live Chat</h3>

<div id="chat-box" style="height:300px;overflow-y:scroll;border:1px solid gray;padding:5px"></div>

<br>

<input id="message" placeholder="Type message">
<button onclick="sendMessage()">Send</button>

</div>


<!-- STUDENT LIST (Teacher only) -->

{% if role == "teacher" %}
<div class="students">

<h3>Students Joined</h3>

<ul id="studentList"></ul>

</div>
{% endif %}


<!-- SCREEN SHARE AREA -->

<div class="screen-section" id="screenArea">

<h3>Screen Sharing</h3>

<video id="screenVideo" autoplay></video>

</div>

</div>

<script>
let localStream;
let peerConnection;

const config = {
    iceServers: [
        { urls: "stun:stun.l.google.com:19302" }
    ]
};
const role = "{{ role }}"
const room = "{{ room_id }}"
const username = "{{ user_name }}"

const socket = io.connect(location.protocol + '//' + document.domain + ':' + location.port);


// JOIN ROOM

socket.on("connect", () => {

socket.emit("join_room",{
room:room,
username:username
})

if(role === "student"){
socket.emit("request_stream",{room:room})
}

})
// RECEIVE CHAT MESSAGE

socket.on("receive_message",function(data){

const chatBox=document.getElementById("chat-box")

chatBox.innerHTML += `<p><b>${data.username}</b>: ${data.message}</p>`

chatBox.scrollTop = chatBox.scrollHeight

})


// SEND CHAT MESSAGE

function sendMessage(){

const msg=document.getElementById("message").value

if(msg.trim() === "") return

socket.emit("send_message",{
room:room,
username:username,
message:msg
})

document.getElementById("message").value=""

}


// TEACHER CAMERA

if(role === "teacher"){

navigator.mediaDevices.getUserMedia({
video:true,
audio:true
})
.then(stream=>{

localStream = stream

const video = document.getElementById("teacherVideo")

video.srcObject = stream

video.muted = true   // ← ADD THIS LINE HERE

})

}


// SCREEN SHARE

async function startScreenShare(){

const stream=await navigator.mediaDevices.getDisplayMedia({
video:true
})

document.getElementById("screenArea").style.display="block"

document.getElementById("screenVideo").srcObject=stream

}


// BLACKBOARD (placeholder)

function openBoard(){

alert("Blackboard will open here in the next step")

}


// END CLASS

function endClass(){

socket.emit("end_class",{
room:room
})

}
socket.on("class_ended", function(data){

alert(data.message)

window.location.href="/dashboard"

})


socket.on("start_stream", async () => {

if(role !== "teacher" || !localStream) return;

peerConnection = new RTCPeerConnection(config);

localStream.getTracks().forEach(track => {
peerConnection.addTrack(track, localStream);
});

peerConnection.onicecandidate = event => {
if(event.candidate){
socket.emit("ice_candidate",{
room:room,
candidate:event.candidate
})
}
}

const offer = await peerConnection.createOffer();
await peerConnection.setLocalDescription(offer);

socket.emit("video_offer",{
room:room,
offer:offer
});

});


socket.on("video_offer", async data => {

if(role !== "student") return;

peerConnection = new RTCPeerConnection(config);

peerConnection.ontrack = event => {

document.getElementById("teacherVideo").srcObject = event.streams[0]

}

peerConnection.onicecandidate = event => {

if(event.candidate){
socket.emit("ice_candidate",{
room:room,
candidate:event.candidate
})
}

}

await peerConnection.setRemoteDescription(data.offer);

const answer = await peerConnection.createAnswer();
await peerConnection.setLocalDescription(answer);

socket.emit("video_answer",{
room:room,
answer:answer
});

});

socket.on("video_answer", async data => {

if(role !== "teacher") return;

await peerConnection.setRemoteDescription(data.answer);

});

socket.on("ice_candidate", async data => {

if(peerConnection){

try {
await peerConnection.addIceCandidate(data.candidate)
} catch(e){
console.error("ICE error:", e)
}

}

});


socket.on("user_joined", function(data){

const chatBox = document.getElementById("chat-box")

chatBox.innerHTML += `<p><b>System:</b> ${data.username} joined the class</p>`

chatBox.scrollTop = chatBox.scrollHeight

const studentList = document.getElementById("studentList")

if(studentList){

const li = document.createElement("li")

li.textContent = data.username

studentList.appendChild(li)

}

})
</script>

</body>
</html>
