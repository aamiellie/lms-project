<!DOCTYPE html>
<html>
<head>
    <title>{{ video.title }}</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* ===== GLOBAL ===== */

body{
font-family:"Segoe UI", Arial, sans-serif;
background:#F5F5F5;
color:#1E1E1E;
padding:70px 100px;
font-size:20px;
}

/* ===== TITLE ===== */

h2{
font-size:38px;
font-weight:700;
margin-bottom:10px;
color:#2F2F2F;
}

p{
color:#555;
margin-bottom:30px;
font-size:20px;
}

/* ===== LAYOUT ===== */

.container{
display:flex;
gap:30px;
align-items:flex-start;
}

/* ===== VIDEO PANEL ===== */

.left{
width:60%;
background:#FFFFFF;
border-radius:14px;
padding:20px;
box-shadow:0 6px 18px rgba(0,0,0,0.06);
}

video{
width:100%;
border-radius:10px;
}

/* ===== RIGHT SIDE ===== */

.right{
width:40%;
display:flex;
flex-direction:column;
gap:20px;
}

/* ===== BOX ===== */

.box{
background:#FFFFFF;
border-radius:14px;
padding:22px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
min-height:180px;
}

.box h4{
color:#2F2F2F;
margin-bottom:15px;
font-weight:600;
font-size:22px;
}

/* ===== QUESTIONS ===== */

button{
margin-top:12px;
padding:10px 18px;
background:#F2C94C;
color:#1E1E1E;
border:none;
border-radius:8px;
cursor:pointer;
font-size:18px;
font-weight:600;
}

button:hover{
background:#e4b93f;
}

/* ===== OPTIONS ===== */

#optionsArea label{
font-size:18px;
margin-left:6px;
}

/* ===== FEEDBACK ===== */

.correct{
color:#2E7D32;
font-weight:600;
font-size:20px;
}

.wrong{
color:#C62828;
font-weight:600;
font-size:20px;
}

.hidden{
display:none;
}

/* ===== QUIZ BUTTON ===== */

.quiz-btn{
display:inline-block;
margin-top:30px;
padding:14px 26px;
background:#F2C94C;
color:#1E1E1E;
border-radius:10px;
text-decoration:none;
font-weight:600;
font-size:20px;
}

.quiz-btn:hover{
background:#e4b93f;
}

/* ===== BACK LINK ===== */

a{
color:#1E1E1E;
font-size:18px;
text-decoration:none;
}

a:hover{
color:#F2C94C;
}

</style>
</head>

<body>

<h2>{{ video.title }}</h2>
<p>{{ video.description }}</p>

<div class="container">

    <!-- LEFT: VIDEO -->
    <div class="left">
        <video id="lectureVideo" controls>
            <source src="/videos/{{ video.video_filename }}" type="video/mp4">
            Your browser does not support video playback.
        </video>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">

        <!-- Presentation -->
        <div class="box">
            <h4>📊 Presentation</h4>
            <p>Slides will appear here (later).</p>
        </div>

        <!-- Questions -->
        <div class="box">
            <h4>❓ Questions</h4>

            <div id="questionArea" class="hidden">
                <p id="questionText"></p>
                <div id="optionsArea"></div>
                <button onclick="submitAnswer()">Submit</button>
                <p id="feedback"></p>
            </div>

            <p id="waitingText">Questions will appear during the class.</p>
        </div>

    </div>

</div>
<br>

<button onclick="handleQuizClick()">
    Take After Class Quiz
</button>

<br><br>
<a href="/student/classroom/{{ classroom._id }}">⬅ Back to Classroom</a>

<script>
    const video = document.getElementById("lectureVideo");

    const questions = {{ questions | tojson }};
    let askedQuestions = [];
    let currentQuestion = null;

    video.addEventListener("timeupdate", function() {
        const currentTime = Math.floor(video.currentTime);

        questions.forEach(q => {
            if (!askedQuestions.includes(q._id) && q.ask_time !== null) {
                if (currentTime === q.ask_time) {
                    pauseAndAsk(q);
                }
            }
        });
    });

    function pauseAndAsk(question) {
        video.pause();
        currentQuestion = question;

        document.getElementById("waitingText").classList.add("hidden");
        document.getElementById("questionArea").classList.remove("hidden");

        document.getElementById("questionText").innerText = question.question;

        const optionsArea = document.getElementById("optionsArea");
        optionsArea.innerHTML = "";

        const letters = ["A", "B", "C", "D"];

        question.options.forEach((option, index) => {

            const radio = document.createElement("input");
            radio.type = "radio";
            radio.name = "option";   // ✅ correct
            radio.value = letters[index];

            const label = document.createElement("label");
            label.innerText = letters[index] + ". " + option;

            optionsArea.appendChild(radio);
            optionsArea.appendChild(label);
            optionsArea.appendChild(document.createElement("br"));
        });
    }

    function submitAnswer() {

        const selected = document.querySelector('input[name="option"]:checked');  // ✅ FIXED
        const feedback = document.getElementById("feedback");

        if (!selected) {
            feedback.innerHTML = "<span style='color:orange;'>Please select an answer.</span>";
            return;
        }

        const selectedLetter = selected.value;

        if (selectedLetter === currentQuestion.correct_answer) {

            feedback.innerHTML = `
                <div class="correct">
                    Correct ✅
                </div>
                <br>
                <button onclick="continueVideo()">OK</button>
            `;

        } else {

            feedback.innerHTML = `
                <div class="wrong">
                    Wrong ❌
                </div>
                <br>
                <strong>Correct answer:</strong> ${currentQuestion.correct_answer}
                <br><br>
                ${currentQuestion.explanation}
                <br><br>
                <button onclick="continueVideo()">OK</button>
            `;
        }

        askedQuestions.push(currentQuestion._id);
    }

    function continueVideo() {
        document.getElementById("questionArea").classList.add("hidden");
        document.getElementById("waitingText").classList.remove("hidden");
        document.getElementById("feedback").innerHTML = "";
        video.play();
    }
</script>
<script>
const quizDone = {{ 'true' if quiz_done else 'false' }};

function handleQuizClick(){
    if(quizDone === true){
        alert("⚠️ You have already attended this quiz!");
    } else {
        window.location.href = "/student/classroom/{{ classroom._id }}/video/{{ video._id }}/quiz";
    }
}
</script>
</body>
</html>
