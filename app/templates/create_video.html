<!DOCTYPE html>
<html>
<head>
    <title>Create Video</title>

<style>

:root{
--primary:#F2C94C;
--bg:#F5F5F5;
--card:#FFFFFF;
--text:#1E1E1E;
--grey:#BDBDBD;
--dark:#2F2F2F;
}

/* ===== GLOBAL ===== */

body{
margin:0;
padding:70px 100px;
background:var(--bg);
color:var(--text);
font-family:"Segoe UI", Arial, sans-serif;
font-size:20px;
}

/* ===== TITLE ===== */

h2{
font-size:36px;
margin-bottom:40px;
color:var(--dark);
}

/* ===== FORM CARD ===== */

form{
background:var(--card);
padding:35px;
border-radius:14px;
max-width:650px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

/* ===== LABEL ===== */

label{
display:block;
margin-bottom:8px;
font-size:18px;
}

/* ===== INPUTS ===== */

input[type="text"],
textarea,
select,
input[type="file"]{
width:96%;
padding:14px;
border-radius:6px;
border:1px solid var(--grey);
margin-bottom:20px;
font-size:18px;
background:#fff;
}

textarea{
resize:none;
}

/* ===== FOCUS ===== */

input:focus,
textarea:focus,
select:focus{
outline:none;
border-color:var(--primary);
}

/* ===== BUTTON ===== */

button{
background:var(--primary);
color:var(--text);
border:none;
padding:14px 26px;
border-radius:10px;
font-weight:600;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#e4b93f;
}

/* ===== BACK LINK ===== */

.back-link{
display:inline-block;
margin-top:40px;
font-size:18px;
text-decoration:none;
color:var(--text);
}

.back-link:hover{
color:var(--primary);
}

</style>
</head>

<body>

    <h2>Create Video from Text / PDF</h2>

    <form method="POST" enctype="multipart/form-data">

        <label>Video Title</label>
        <input type="text" name="title" required>

        <label>Description</label>
        <textarea name="description" rows="3"></textarea>

        <label>Upload File</label>
        <input type="file" name="file" required>

        <label>Select Presenter</label>
        <select name="presenter">
            <option value="ai_girl.mp4">AI Girl</option>
            <option value="anime_girl.mp4">Anime Girl</option>
            <option value="gojo.mp4">Gojo</option>
        </select>

        <button type="submit">
            Extract Content
        </button>

    </form>

    <a href="/teacher/classroom/{{ classroom_id }}" class="back-link">
        ⬅ Back to Classroom
    </a>

</body>
</html>
