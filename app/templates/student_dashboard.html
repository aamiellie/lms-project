<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard | LUMA</title>

<style>

/* =========================
COLOR SYSTEM
========================= */

:root{
--primary:#F2C94C;
--bg:#F5F5F5;
--card:#FFFFFF;
--text:#1E1E1E;
--grey:#BDBDBD;
--dark:#2F2F2F;
}

/* =========================
GLOBAL
========================= */

body{
margin:0;
padding:70px 100px;
background:var(--bg);
color:var(--text);
font-family:"Segoe UI", Arial, sans-serif;
font-size:18px;
}

/* =========================
HEADINGS
========================= */

h2{
font-size:36px;
margin-bottom:10px;
}

.welcome-text{
font-size:20px;
color:#666;
margin-bottom:40px;
}

/* =========================
JOIN BUTTON
========================= */

.action-section{
margin-bottom:50px;
}

.action-btn{
display:inline-block;
background:var(--primary);
color:black;
padding:16px 28px;
border-radius:10px;
text-decoration:none;
font-weight:600;
font-size:18px;
}

.action-btn:hover{
background:#e0b93f;
}

/* =========================
SECTION TITLE
========================= */

h3{
font-size:26px;
margin-bottom:25px;
}

/* =========================
CLASSROOM GRID
========================= */

.classroom-grid{
display:grid;
grid-template-columns:repeat(auto-fill, minmax(260px,1fr));
gap:25px;
}

/* =========================
CLASSROOM CARD
========================= */

.classroom-card{
background:var(--card);
padding:28px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.06);
transition:0.2s;
}

.classroom-card:hover{
transform:translateY(-4px);
box-shadow:0 10px 24px rgba(0,0,0,0.08);
}

.classroom-link{
text-decoration:none;
color:var(--text);
font-weight:600;
font-size:20px;
}

.classroom-link:hover{
color:var(--primary);
}

/* =========================
EMPTY TEXT
========================= */

.empty-text{
color:#777;
font-style:italic;
}

/* =========================
LOGOUT
========================= */

.logout-link{
display:inline-block;
margin-top:50px;
font-size:18px;
color:var(--text);
text-decoration:none;
font-weight:500;
}

.logout-link:hover{
color:var(--primary);
}

</style>
</head>

<body>

    <h2>Student Dashboard</h2>

    <p class="welcome-text">Welcome, {{ name }} 👋</p>

    <div class="action-section">
        <a href="/student/join-classroom" class="action-btn">
            + Join Classroom
        </a>
    </div>

    <h3>Your Classrooms</h3>

    {% if classrooms %}
        <div class="classroom-grid">
            {% for classroom in classrooms %}
                <div class="classroom-card">
                    <a href="/student/classroom/{{ classroom._id }}" class="classroom-link">
                        {{ classroom.class_name }}
                    </a>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <p class="empty-text">You haven’t joined any classrooms yet.</p>
    {% endif %}

    <a href="/logout" class="logout-link">
        Logout
    </a>

</body>
</html>
