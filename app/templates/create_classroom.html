<!DOCTYPE html>
<html>
<head>
    <title>Create Classroom | Teacher</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<style>

:root{
--primary:#F2C94C;
--bg:#F5F5F5;
--card:#FFFFFF;
--text:#1E1E1E;
--grey:#BDBDBD;
--dark:#2F2F2F;
}

/* ===== GLOBAL ===== */

body{
margin:0;
background:var(--bg);
font-family:"Segoe UI", Arial, sans-serif;
color:var(--text);
font-size:20px;
}

/* ===== CONTAINER ===== */

.dashboard-container{
padding:70px 100px;
}

/* ===== HEADER ===== */

.dashboard-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
}

.dashboard-header h2{
font-size:32px;
color:var(--dark);
}

/* ===== BACK BUTTON ===== */

.logout-btn{
text-decoration:none;
padding:10px 18px;
border-radius:8px;
background:var(--primary);
color:black;
font-weight:600;
transition:0.2s ease;
}

.logout-btn:hover{
background:#e0b93f;
}

/* ===== FORM CARD ===== */

.create-box{
background:var(--card);
padding:35px;
border-radius:14px;
max-width:600px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

/* ===== LABEL ===== */

label{
display:block;
margin-bottom:8px;
color:#666;
font-size:16px;
}

/* ===== INPUT ===== */

input{
width:100%;
padding:14px;
border-radius:8px;
border:1px solid #ddd;
margin-bottom:25px;
font-size:16px;
background:#fafafa;
}

input:focus{
outline:none;
border-color:var(--primary);
background:white;
}

/* ===== BUTTON ===== */

.create-btn{
background:var(--primary);
color:black;
border:none;
padding:14px 24px;
border-radius:10px;
font-weight:600;
font-size:16px;
cursor:pointer;
transition:0.2s ease;
}

.create-btn:hover{
background:#e0b93f;
transform:translateY(-1px);
}

</style>    
</head>

<body class="teacher-theme">

<div class="dashboard-container">

    <div class="dashboard-header">
        <h2>Create Virtual Classroom</h2>
        <a href="/teacher/dashboard" class="logout-btn">Back</a>
    </div>

    <div class="create-box">
        <form method="POST">

            <label>Classroom Name</label>
            <input type="text" name="class_name" required>

            <button type="submit" class="create-btn">
                Create Classroom
            </button>

        </form>
    </div>

</div>

</body>
</html>
