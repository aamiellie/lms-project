<!DOCTYPE html>
<html>
<head>
<title>Join Classroom | LMS</title>

<style>

/* GLOBAL */

body{
font-family:"Segoe UI", Arial, sans-serif;
background:#F5F5F5;
color:#1E1E1E;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
font-size:20px;
}

/* CARD */

.join-card{
background:#FFFFFF;
padding:50px;
width:420px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.06);
text-align:center;
}

/* TITLE */

h2{
font-size:36px;
margin-bottom:30px;
color:#2F2F2F;
}

/* LABEL */

label{
font-size:18px;
display:block;
margin-bottom:8px;
}

/* INPUT */

input{
width:100%;
padding:14px;
border-radius:8px;
border:1px solid #BDBDBD;
font-size:18px;
margin-bottom:25px;
}

input:focus{
outline:none;
border-color:#F2C94C;
}

/* BUTTON */

button{
width:100%;
padding:14px;
background:#F2C94C;
border:none;
border-radius:10px;
font-size:18px;
font-weight:600;
cursor:pointer;
color:#1E1E1E;
}

button:hover{
background:#e4b93f;
}

/* BACK LINK */

.back-link{
display:inline-block;
margin-top:25px;
font-size:18px;
text-decoration:none;
color:#1E1E1E;
}

.back-link:hover{
color:#F2C94C;
}

</style>

</head>

<body>

<div class="join-card">

<h2>Join Virtual Classroom</h2>

<form method="POST">

<label>Invite Code</label>
<input type="text" name="invite_code" required>

<button type="submit">Join Classroom</button>

</form>

<a href="/student/dashboard" class="back-link">← Back to Dashboard</a>

</div>

</body>
</html>
