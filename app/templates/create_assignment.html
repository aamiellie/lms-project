<!DOCTYPE html>
<html>
<head>
    <title>Create Assignment</title>

<style>

:root{
--primary:#F2C94C;
--bg:#F5F5F5;
--card:#FFFFFF;
--text:#1E1E1E;
--grey:#BDBDBD;
--dark:#2F2F2F;
}

/* ===== GLOBAL ===== */

body{
margin:0;
padding:70px 100px;
background:var(--bg);
color:var(--text);
font-family:"Segoe UI", Arial, sans-serif;
font-size:20px;
}

/* ===== TITLE ===== */

h2{
font-size:34px;
margin-bottom:35px;
color:var(--dark);
}

/* ===== FORM CARD ===== */

form{
background:var(--card);
padding:35px;
border-radius:14px;
max-width:650px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

/* ===== LABEL ===== */

label{
display:block;
margin-bottom:8px;
color:#666;
font-size:16px;
}

/* ===== INPUTS ===== */

input,
textarea{
width:94%;
padding:14px;
border-radius:8px;
border:1px solid #ddd;
margin-bottom:22px;
font-size:16px;
background:#fafafa;
}

textarea{
min-height:120px;
resize:vertical;
}

input:focus,
textarea:focus{
outline:none;
border-color:var(--primary);
background:white;
}

/* ===== BUTTON ===== */

button{
background:var(--primary);
color:black;
border:none;
padding:14px 24px;
border-radius:10px;
font-weight:600;
font-size:16px;
cursor:pointer;
transition:0.2s ease;
}

button:hover{
background:#e0b93f;
transform:translateY(-1px);
}

/* ===== BACK LINK ===== */

.back-link{
display:inline-block;
margin-top:40px;
font-size:18px;
text-decoration:none;
color:var(--text);
}

.back-link:hover{
color:var(--primary);
}

</style>
</head>

<body>

<h2>Create Assignment</h2>

<form method="POST" enctype="multipart/form-data">

    <label>Title</label>
    <input type="text" name="title" required>

    <label>Description</label>
    <textarea name="description"></textarea>

    <label>Upload Question File (PDF/DOC)</label>
    <input type="file" name="file">

    <label>Due Date</label>
    <input type="date" name="due_date">

    <button type="submit">Create Assignment</button>

</form>

<a href="javascript:history.back()" class="back-link">
    ⬅ Back
</a>

</body>
</html>
