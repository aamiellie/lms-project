<!DOCTYPE html>
<html>
<head>
    <title>LUMA | Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<style>

/* =========================
COLOR SYSTEM
========================= */

:root{
--primary:#F2C94C;
--bg:#F5F5F5;
--card:#FFFFFF;
--text:#1E1E1E;
--grey:#BDBDBD;
--dark:#2F2F2F;
}

/* =========================
GLOBAL
========================= */

body{
margin:0;
font-family:"Segoe UI", Arial, sans-serif;
background:var(--bg);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:var(--text);
font-size:18px;
}

/* =========================
AUTH CONTAINER
========================= */

.auth-container{
width:100%;
display:flex;
justify-content:center;
align-items:center;
}

/* =========================
AUTH CARD
========================= */

.auth-card{
background:var(--card);
padding:55px 50px;
width:420px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.auth-card h2{
margin:0;
font-size:32px;
font-weight:700;
}

.auth-subtitle{
font-size:18px;
margin:10px 0 35px 0;
color:#666;
}

/* =========================
FORM
========================= */

.auth-form{
display:flex;
flex-direction:column;
}

.auth-form label{
font-size:16px;
margin-top:18px;
font-weight:500;
}

.auth-form input{
padding:14px;
margin-top:8px;
border-radius:8px;
border:1px solid var(--grey);
font-size:16px;
}

.auth-form input:focus{
outline:none;
border-color:var(--primary);
}

/* =========================
BUTTON
========================= */

.btn-primary{
margin-top:30px;
padding:16px;
background:var(--primary);
border:none;
border-radius:10px;
font-weight:600;
font-size:18px;
cursor:pointer;
}

.btn-primary:hover{
background:#e0b93f;
}

/* =========================
FOOTER
========================= */

.auth-footer{
margin-top:30px;
text-align:center;
font-size:16px;
}

.auth-footer a{
color:var(--dark);
font-weight:600;
}

.auth-footer a:hover{
color:var(--primary);
}

</style>
</head>
<body class="light">

<div class="auth-container">
    <div class="auth-card">

        <h2>Welcome Back</h2>
        <p class="auth-subtitle">Login to continue learning</p>

        <form method="POST" class="auth-form">

            <label>Email</label>
            <input type="email" name="email" required>

            <label>Password</label>
            <input type="password" name="password" required>

            <button type="submit" class="btn-primary">Login</button>

        </form>

        <div class="auth-footer">
            <a href="/">← Back to Home</a>
        </div>

    </div>
</div>

</body>
</html>
